name: HRX build

on:
  workflow_dispatch:
    inputs:
      hrx_release_type:
        description: TheRock artifact release type
        required: false
        default: nightly
        type: string
      hrx_run_id:
        description: TheRock artifact run id. Leave empty for the latest complete Linux run.
        required: false
        default: ''
        type: string
      hrx_artifact_set:
        description: TheRock ROCm artifact set
        required: false
        default: core-with-upstream-hip
        type: string
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-hrx.yml'
      - 'scripts/hrx/**'
      - 'tools/**'
      - 'benchmark-configs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/build-hrx.yml'
      - 'scripts/hrx/**'
      - 'tools/**'
      - 'benchmark-configs/**'

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  hrx-build:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    env:
      HRX_RELEASE_TYPE: ${{ github.event.inputs.hrx_release_type || 'nightly' }}
      HRX_RUN_ID: ${{ github.event.inputs.hrx_run_id || '' }}
      HRX_ARTIFACT_SET: ${{ github.event.inputs.hrx_artifact_set || 'core-with-upstream-hip' }}
      CCACHE_COMPILERCHECK: content
      TEST_BACKEND: CPU

    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install ROCm build dependencies
        run: scripts/hrx/install-rocm-deps.sh

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: ubuntu-latest-${{ env.HRX_ARTIFACT_SET }}
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Checkout HRX
        run: scripts/hrx/checkout-hrx.sh

      - name: Fetch ROCm assets
        run: scripts/hrx/fetch-rocm-assets.sh

      - name: Build HRX
        run: scripts/hrx/build-hrx.sh

      - name: Validate HRX
        run: scripts/hrx/validate-hrx.sh

      - name: Checkout llama.cpp
        run: scripts/hrx/checkout-llama.sh

      - name: Build llama.cpp with HRX
        run: scripts/hrx/build-llama-hrx.sh

      - name: Run sample MUL_MAT correctness config on CPU
        run: |
          . scripts/hrx/env.sh
          . scripts/hrx/runtime-env.sh
          tools/run-op-test.py \
            --test-backend-ops "${LLAMA_BUILD_DIR}/bin/test-backend-ops" \
            --test-file benchmark-configs/test/mul_mat_f16.txt \
            --op MUL_MAT \
            --backend CPU \
            --output benchmark-results/sample-mul-mat-f16-cpu-test.jsonl

      - name: Run sample MUL_MAT benchmark config on CPU
        run: |
          . scripts/hrx/env.sh
          . scripts/hrx/runtime-env.sh
          tools/run-op-perf.py \
            --test-backend-ops "${LLAMA_BUILD_DIR}/bin/test-backend-ops" \
            --test-file benchmark-configs/test/mul_mat_f16.txt \
            --op MUL_MAT \
            --backend CPU \
            --output benchmark-results/sample-mul-mat-f16-cpu-perf.jsonl

      - name: Upload CPU benchmark results
        uses: actions/upload-artifact@v5
        with:
          name: cpu-benchmark-results
          path: benchmark-results/

      - name: Download previous CPU benchmark results
        env:
          GH_TOKEN: ${{ github.token }}
          PARENT_SHA: ${{ github.event.before || github.event.pull_request.base.sha || '' }}
        run: tools/download-parent-artifact.sh cpu-benchmark-results benchmark-results/previous

      - name: Compare CPU benchmark results
        run: |
          set -euo pipefail
          previous="benchmark-results/previous/sample-mul-mat-f16-cpu-perf.jsonl"
          current="benchmark-results/sample-mul-mat-f16-cpu-perf.jsonl"
          if [[ ! -f "${previous}" ]]; then
            echo "No previous CPU benchmark JSONL found; skipping comparison."
            exit 0
          fi
          . scripts/hrx/env.sh
          . scripts/hrx/runtime-env.sh
          tools/compare-op-perf.py "${previous}" "${current}" --max-regression-pct 5 --require-all-cases
